<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление офисами – CarMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand">
        <div class="container-fluid">
            <a class="navbar-brand" href="/map">CarMap</a>
            <a href="/map" class="btn btn-outline-light btn-sm me-2" id="map-btn">На главную</a>
            <button id="logout-btn" class="btn btn-outline-light btn-sm">Выйти</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Управление офисами</h2>
        <button id="add-office-btn" class="btn btn-primary mb-3">Добавить офис</button>
        <div id="alert-container"></div>
        <div id="offices-table-container">
            <p>Загрузка...</p>
        </div>
    </div>

    <div class="modal fade" id="officeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Добавить офис</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="office-form">
                        <input type="hidden" id="office-id">
                        <div class="mb-3">
                            <label for="office-name" class="form-label">Название</label>
                            <input type="text" class="form-control" id="office-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Расположение</label>
                            <input type="text" class="form-control" id="office-address" required>
                            <button type="button" class="btn btn-outline-secondary" id="pick-office-btn">Указать на карте</button>
                            <div id="officeCoords" class="form-text text-muted"></div>
                            <input type="hidden" id="office-lat">
                            <input type="hidden" id="office-lon">
                        </div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="button" class="btn btn-primary" id="save-office-btn">Сохранить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение удаления</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Вы действительно хотите удалить офис «<span id="delete-office-name"></span>»?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete-btn">Удалить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <script src="/js/common.js"></script>
    <script src="/js/admin-offices.js"></script>
</body>
</html>
