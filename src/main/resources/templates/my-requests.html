<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заявки – CarMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand">
        <div class="container-fluid">
            <a class="navbar-brand" href="/map">CarMap</a>
            <a href="/map" class="btn btn-outline-light btn-sm me-2" id="map-btn">На главную</a>
            <button id="logout-btn" class="btn btn-outline-light btn-sm">Выйти</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Мои заявки</h2>
        
        <h4>Ожидают <span class="badge bg-warning"></span></h4>
        <div id="requests-pending">Загрузка...</div>
        
        <h4>Приняты <span class="badge bg-success"></span></h4>
        <div id="requests-accepted">Загрузка...</div>
        
        <h4>Отклонены <span class="badge bg-danger"></span></h4>
        <div id="requests-rejected">Загрузка...</div>
    </div>

    <template id="request-card-template">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="ride-info"></h5>
                <p class="driver-name"></p>
                <p class="departure-time"></p>
                <p class="seats-info"></p>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>

    <script src="/js/auth-helper.js"></script>
    <script src="/js/my-requests.js"></script>
</body>
</html>
