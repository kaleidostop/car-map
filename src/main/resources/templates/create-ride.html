<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложить поездку – CarMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/map">CarMap</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Предложить поездку</h2>
        <form id="ride-form">
            <div class="mb-3">
                <label for="office" class="form-label">Офис назначения</label>
                <select class="form-select" id="office" required>
                    <option value="">Выберите офис</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="departureAddress" class="form-label">Адрес отправления</label>
                <input type="text" class="form-control" id="departureAddress" required>
            </div>
            <div class="mb-3">
                <label for="departureLat" class="form-label">Широта (lat)</label>
                <input type="number" step="any" class="form-control" id="departureLat" required>
            </div>
            <div class="mb-3">
                <label for="departureLon" class="form-label">Долгота (lon)</label>
                <input type="number" step="any" class="form-control" id="departureLon" required>
            </div>
            <div class="mb-3">
                <label for="departureTime" class="form-label">Время отправления</label>
                <input type="datetime-local" class="form-control" id="departureTime" required>
            </div>
            <div class="mb-3">
                <label for="seatsTotal" class="form-label">Количество мест</label>
                <input type="number" class="form-control" id="seatsTotal" value="4" min="1" max="8" required>
            </div>
            <button type="submit" class="btn btn-primary">Создать поездку</button>
            <a href="/map" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <script src="/js/auth-helper.js"></script>
    <script src="/js/create-ride.js"></script>
</body>
</html>
