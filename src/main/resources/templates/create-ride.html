<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предложить поездку – CarMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand">
        <div class="container-fluid">
            <a class="navbar-brand" href="/map">CarMap</a>
            <button id="logout-btn" class="btn btn-outline-light btn-sm">Выйти</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Предложить поездку</h2>
        <form id="ride-form">
            <div class="mb-3">
                <label for="office" class="form-label">Офис назначения</label>
                <select class="form-select" id="office" required>
                    <option value="">Выберите офис</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="departureAddress" class="form-label">Место отправления</label>
                <input type="text" class="form-control" id="departureAddress" required>
                <button type="button" class="btn btn-outline-secondary" id="pick-departure-btn">Указать на карте</button>
                <div id="departureCoords" class="form-text text-muted"></div>
                <input type="hidden" id="departureLat">
                <input type="hidden" id="departureLon">
            </div>
            <div class="mb-3">
                <label for="departureTime" class="form-label">Время отправления</label>
                <input type="datetime-local" class="form-control" id="departureTime" required>
            </div>
            <div class="mb-3">
                <label for="seatsTotal" class="form-label">Количество мест</label>
                <input type="number" class="form-control" id="seatsTotal" value="4" min="1" max="8" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="manualApproval" checked>
                <label class="form-check-label" for="manualApproval">Ручное подтверждение заявок</label>
            </div>
            <div id="auto-limits" style="display:none;">
                <div class="mb-3">
                    <label for="maxDetourMinutes" class="form-label">Макс. добавочное время (мин)</label>
                    <input type="number" class="form-control" id="maxDetourMinutes" min="0">
                </div>
                <div class="mb-3">
                    <label for="maxDetourMeters" class="form-label">Макс. добавочное расстояние (м)</label>
                    <input type="number" class="form-control" id="maxDetourMeters" min="0">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Создать поездку</button>
            <a href="/map" class="btn btn-secondary">Отмена</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <script src="/js/common.js"></script>
    <script src="/js/create-ride.js"></script>
</body>
</html>
