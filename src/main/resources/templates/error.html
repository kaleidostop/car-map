<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center py-4 bg-light min-vh-100">
    <div class="container text-center">
        <h1 class="display-1" th:text="${status}">404</h1>
        <h2 th:text="${error}">Not Found</h2>
        <p th:text="${message}">Страница не найдена</p>
        <a href="/map" class="btn btn-primary">На главную</a>
    </div>
    <script>
        if (!localStorage.getItem('jwt_token')) {
            window.location.href = '/login';
        }
    </script>
</body>
</html>
