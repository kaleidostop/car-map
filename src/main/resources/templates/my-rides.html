<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои поездки – CarMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <style>.border-purple { border-color: #6f42c1 !important; }</style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand">
        <div class="container-fluid">
            <a class="navbar-brand" href="/map">CarMap</a>
            <a href="/map" class="btn btn-outline-light btn-sm me-2" id="map-btn">На главную</a>
            <button id="logout-btn" class="btn btn-outline-light btn-sm">Выйти</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Мои поездки</h2>
        
        <h4>В процессе</h4>
        <div id="rides-in-progress">Загрузка...</div>

        <h4>Запланированные</h4>
        <div id="rides-active-or-full">Загрузка...</div>    
        
        <h4>Завершённые</h4>
        <div id="rides-completed">Загрузка...</div>
        
        <h4>Отменённые</h4>
        <div id="rides-cancelled">Загрузка...</div>
    </div>

    <template id="ride-card-template">
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="ride-title"></h5>
                <p class="ride-info"></p>
                <button class="btn btn-sm btn-info load-requests" style="display:none;">Заявки</button>
                <button class="btn btn-sm btn-danger cancel-ride-btn" style="display:none;">Отменить</button>
                <div class="requests-container mt-2"></div>  
                <div class="passengers-list mt-2" style="display:none;"></div>
            </div>
        </div>
    </template>

    <template id="request-card-template">
        <div class="d-flex align-items-center justify-content-between border p-2 request-item">
            <div>
                <strong class="passenger-name"></strong><br>
                <small class="text-muted detour-info"></small>
            </div>
            <div>
                <button class="btn btn-success btn-sm accept-btn">Принять</button>
                <button class="btn btn-danger btn-sm reject-btn">Отклонить</button>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="/js/auth-helper.js"></script>
    <script src="/js/my-rides.js"></script>
</body>
</html>
