<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта офисов – CarMap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

    <style>
        #map { height: 70vh; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand">
        <div class="container-fluid">
            <span class="navbar-brand">CarMap</span>
            <div>
                <span id="user-info" class="text-light me-3"></span>
                <a href="/create-ride" class="btn btn-success btn-sm me-2" id="create-ride-btn" style="display: none;">Создать поездку</a>
                <a href="/my-requests" class="btn btn-outline-light btn-sm me-2">Мои заявки</a>
                <a href="/my-rides" class="btn btn-outline-light btn-sm me-2" id="my-rides-btn" style="display: none;">Мои поездки</a>
                <a href="/admin/offices" id="admin-link" class="btn btn-outline-warning btn-sm me-2" style="display:none;">Админка</a>
                <button id="logout-btn" class="btn btn-outline-light btn-sm">Выйти</button>
            </div>
        </div>
    </nav>
    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-8">
                <div id="map">
                    <div id="pick-controls" style="display: none; position: absolute; bottom: 20px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 6px; box-shadow: 0 0 12px rgba(0,0,0,0.3);">
                        <span id="pick-instruction">Кликните по карте, чтобы выбрать точку</span><br>
                        <button id="pick-confirm-btn" class="btn btn-success btn-sm mt-1">Подтвердить</button>
                        <button id="pick-cancel-btn" class="btn btn-secondary btn-sm mt-1">Отмена</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <h4>Выберите офис:</h4>
                <select id="office-filter" class="form-select mb-2">
                    <option value="">Все офисы</option>
                </select>

                <h4>Активные поездки</h4>
                <ul id="ride-list" class="list-group"></ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/auth-helper.js"></script>
    <script src="/js/map.js"></script>

</body>
</html>
